name: kuyumcu_flutter
description: Kuyumcu AI Stüdyo - AI destekli takı görsel üretim mobil/web uygulaması
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Network
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # Navigation
  go_router: ^14.2.0

  # Models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # Media
  image_picker: ^1.1.2
  file_picker: ^8.0.3
  cached_network_image: ^3.3.1

  # UI / UX
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  intl: ^0.19.0
  model_viewer_plus: ^1.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
